# Task Planner Bot — Nginx reverse proxy
# Копировать в /etc/nginx/sites-available/task-planner.conf
# Затем: ln -s /etc/nginx/sites-available/task-planner.conf /etc/nginx/sites-enabled/
#
# SSL сертификаты создаются через certbot:
# sudo certbot --nginx -d yourdomain.com

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Certbot challenge (нужен для получения/обновления сертификата)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL сертификаты (certbot обновит пути автоматически)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Рекомендуемые SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Безопасность
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Логи
    access_log /var/log/nginx/task-planner-access.log;
    error_log /var/log/nginx/task-planner-error.log;

    # === API — проксирование на FastAPI ===
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # CORS — обрабатывает FastAPI, не nginx
    }

    # === Webhook — проксирование на FastAPI ===
    location /webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Telegram webhook secret header
        proxy_pass_header X-Telegram-Bot-Api-Secret-Token;
    }

    # === Заглушка для корня (опционально) ===
    location / {
        return 200 '{"status": "Task Planner Bot API"}';
        add_header Content-Type application/json;
    }
}
